name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: true
        type: string
      run_migrations:
        description: 'Run database migrations'
        required: false
        default: 'true'
        type: boolean
      skip_smoke_tests:
        description: 'Skip post-deployment smoke tests'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  pre-deployment-check:
    name: Pre-deployment Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify staging is stable
        run: |
          echo "Checking staging deployment status..."
          # TODO: Integrate with staging health check or deployment status API
          echo "Ensure staging has been running for at least 10 minutes"

      - name: Verify release version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must follow semver format (e.g., v1.2.3)"
            exit 1
          fi
          echo "Version ${{ inputs.version }} is valid"

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: pre-deployment-check
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deployment-check, build]
    environment:
      name: production
      url: https://omni.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment record
        run: |
          echo "Creating deployment record for ${{ inputs.version }}..."
          # TODO: Integrate with deployment tracking system

      - name: Run database migrations
        if: inputs.run_migrations == 'true'
        run: |
          echo "Running database migrations..."
          # TODO: Add migration commands with production credentials
        env:
          DB_HOST: ${{ secrets.PROD_DB_HOST }}
          DB_PORT: ${{ secrets.PROD_DB_PORT }}
          DB_NAME: ${{ secrets.PROD_DB_NAME }}
          DB_USER: ${{ secrets.PROD_DB_USER }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}

      - name: Deploy to production server
        run: |
          chmod +x ./deploy-prod.sh
          ./deploy-prod.sh ${{ inputs.version }}
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}

  smoke-tests:
    name: Post-deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-production
    if: inputs.skip_smoke_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          chmod +x ./scripts/smoke-test.sh
          ./scripts/smoke-test.sh production
        env:
          SMOKE_TEST_URL: ${{ secrets.PROD_URL }}
          SMOKE_TEST_TOKEN: ${{ secrets.PROD_SMOKE_TEST_TOKEN }}

      - name: Verify critical endpoints
        run: |
          echo "Checking critical endpoints..."
          curl -f ${{ secrets.PROD_URL }}/health || exit 1
          curl -f ${{ secrets.PROD_URL }}/api/health || exit 1

  rollback:
    name: Rollback (on failure)
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: failure()
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Attempt rollback
        run: |
          echo "Deployment failed. Initiating rollback..."
          chmod +x ./scripts/rollback.sh
          ./scripts/rollback.sh
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}

      - name: Notify failure
        run: |
          echo "Deployment failed and rollback was attempted."
          # TODO: Send notification (Slack, PagerDuty, etc.)

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: success()
    steps:
      - name: Notify deployment success
        run: |
          echo "Deployment of ${{ inputs.version }} to production completed successfully."
          # TODO: Send notification (Slack, PagerDuty, etc.)
