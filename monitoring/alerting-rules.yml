groups:
  - name: 'omni-app-health'
    interval: 30s
    rules:
      - alert: OmniAppDown
        expr: up{job="omni-app"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: 'Omni application is down'
          description: 'Omni app has been down for more than 30 seconds on {{ $labels.instance }}'

      - alert: OmniAppHighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) 
          / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'High error rate on Omni'
          description: 'Error rate is above 1% (current: {{ $value | humanizePercentage }})'

      - alert: OmniAppCriticalErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) 
          / rate(http_requests_total[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Critical error rate on Omni'
          description: 'Error rate is above 5% (current: {{ $value | humanizePercentage }}). Immediate attention required.'

      - alert: OmniAppHighLatency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High latency on Omni'
          description: '95th percentile latency is above 500ms (current: {{ $value | humanizeDuration }})'

      - alert: OmniAppCriticalLatency
        expr: |
          histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Critical latency on Omni'
          description: '99th percentile latency is above 1s (current: {{ $value | humanizeDuration }})'

  - name: 'omni-database'
    interval: 30s
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          db_pool_connections_active / db_pool_connections_max > 0.9
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'Database connection pool near exhaustion'
          description: 'Connection pool utilization is above 90% (current: {{ $value | humanizePercentage }})'

      - alert: DatabaseConnectionPoolCritical
        expr: |
          db_pool_connections_active / db_pool_connections_max > 0.95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Database connection pool critical'
          description: 'Connection pool utilization is above 95%. New connections will fail.'

  - name: 'omni-system'
    interval: 30s
    rules:
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High memory usage on {{ $labels.instance }}'
          description: 'Memory usage is above 85% (current: {{ $value | humanizePercentage }})'

      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High CPU usage on {{ $labels.instance }}'
          description: 'CPU usage is above 80% (current: {{ $value | humanizePercentage }})'

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Low disk space on {{ $labels.instance }}'
          description: 'Available disk space is below 10% (current: {{ $value | humanizePercentage }})'

  - name: 'omni-deployment'
    interval: 60s
    rules:
      - alert: DeploymentFailedRecently
        expr: |
          increase(deployment_failures_total[1h]) > 0
        labels:
          severity: warning
        annotations:
          summary: 'Deployment failure detected'
          description: '{{ $value }} deployment failure(s) detected in the last hour'

      - alert: NoRecentDeployment
        expr: |
          time() - max(deployment_timestamp) > 86400 * 3
        labels:
          severity: info
        annotations:
          summary: 'No recent deployments'
          description: 'No deployments detected in the last 3 days'
