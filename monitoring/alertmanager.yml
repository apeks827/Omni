global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  - name: 'default'
    webhook_configs:
      - url: '${WEBHOOK_URL:-http://localhost:3001/webhook}'
        send_resolved: true

  - name: 'critical-alerts'
    webhook_configs:
      - url: '${CRITICAL_WEBHOOK_URL:-http://localhost:3001/webhook}'
        send_resolved: true
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY:-}'
        severity: critical
        send_resolved: true

  - name: 'warning-alerts'
    webhook_configs:
      - url: '${WARNING_WEBHOOK_URL:-http://localhost:3001/webhook}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
