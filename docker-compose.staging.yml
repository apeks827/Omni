version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: omni-postgres-staging
    environment:
      POSTGRES_DB: omni_staging
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Ports removed to avoid conflict with local PostgreSQL; app connects via internal Docker network
    # ports:
    #   - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U omni']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: omni:staging
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omni-app-staging
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: omni_staging
      DB_USER: omni
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
